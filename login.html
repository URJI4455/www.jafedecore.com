<!-- login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Jafe Decor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body class="bg-light">

    <!-- Minimal Header for Auth -->
    <header>
        <div class="nav-container" style="justify-content: center;">
            <a href="index.html" class="brand-logo">
                <img src="j-logo.png" alt="Jafe Decor Logo" class="logo-img">
                <div class="logo-text"><span class="text-white">Jafe</span><span class="text-red">Decor</span></div>
            </a>
        </div>
    </header>

    <section class="section">
        <div class="auth-container">
            <h2 class="section-title" style="margin-bottom: 30px; font-size: 32px;">Welcome Back</h2>
            <form id="loginForm" action="/api/login" method="POST">
                <div class="form-group">
                    <label for="login_phone">Phone Number <span class="text-red">*</span></label>
                    <input type="tel" id="login_phone" name="phone" required placeholder="+2519XXXXXXXX">
                    <small class="phone-error" style="color: red; display: none; margin-top: 5px;">Must be exactly +2519 followed by 8 digits.</small>
                </div>
                
                <div class="form-group" style="position: relative;">
                    <label for="login_password">Password (Numeric) <span class="text-red">*</span></label>
                    <input type="password" id="login_password" name="password" inputmode="numeric" pattern="[0-9]*" required placeholder="Enter your numeric password">
                    <i class="fas fa-eye toggle-password" style="position: absolute; right: 15px; top: 45px; cursor: pointer; color: #888;"></i>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 16px;">Secure Login</button>
            </form>
            <a href="register.html" class="auth-link">Don't have an account? Register now</a>
        </div>
    </section>

</body>
</html>
