<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Jafe Decor</title>

    <!-- PWA Requirements -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#D32F2F">
    <link rel="apple-touch-icon" href="j-logo.png">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body class="bg-light">

    <header>
        <div class="nav-container" style="justify-content: center;">
            <a href="index.html" class="brand-logo">
                <img src="j-logo.png" alt="Jafe Decor Logo" class="logo-img">
                <div class="logo-text"><span class="text-white">Jafe</span><span class="text-red">Decor</span></div>
            </a>
        </div>
    </header>

    <section class="section">
        <div class="auth-container">
            <h2 class="section-title" style="margin-bottom: 10px; font-size: 28px;">Reset Password</h2>
            <p style="text-align: center; color: #666; margin-bottom: 25px; font-size: 14px;">Please verify your identity to create a new password.</p>
            
            <div id="resetError" class="error-box"></div>
            <div id="resetSuccess" class="success-box" style="display:none; margin-bottom: 20px;">
                Password successfully reset! You can now <a href="login.html" style="color: #2e7d32; font-weight: bold; text-decoration: underline;">Login Here</a>.
            </div>

            <form id="resetForm">
                <div class="form-group">
                    <label>Registered Phone Number <span class="text-red">*</span></label>
                    <input type="tel" id="reset_phone" name="phone" required placeholder="+2519XXXXXXXX">
                </div>

                <div class="form-group">
                    <label>First Name (Security Check) <span class="text-red">*</span></label>
                    <input type="text" name="first_name" required placeholder="Enter your first name">
                </div>
                
                <div class="form-group" style="position: relative;">
                    <label>New Password (Numeric) <span class="text-red">*</span></label>
                    <input type="password" id="new_password" name="new_password" inputmode="numeric" pattern="[0-9]*" required placeholder="Create a new numeric password">
                    <i class="fas fa-eye toggle-password" style="position: absolute; right: 15px; top: 45px; cursor: pointer; color: #888;"></i>
                </div>

                <div class="form-group" style="position: relative;">
                    <label>Confirm New Password <span class="text-red">*</span></label>
                    <input type="password" id="confirm_password" name="confirm_password" inputmode="numeric" pattern="[0-9]*" required placeholder="Confirm new password">
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 16px;">Reset Password</button>
            </form>
            
            <div style="text-align: center; margin-top: 20px;">
                <a href="login.html" class="auth-link" style="color: #555;">Back to Login</a>
            </div>
        </div>
    </section>

</body>
</html>
