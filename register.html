<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Jafe Decor</title>

    <!-- PWA Requirements -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#D32F2F">
    <link rel="apple-touch-icon" href="j-logo.png">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
</head>
<body class="bg-light">

    <!-- Minimal Header for Auth -->
    <header>
        <div class="nav-container" style="justify-content: center;">
            <a href="index.html" class="brand-logo">
                <img src="j-logo.png" alt="Jafe Decor Logo" class="logo-img">
                <div class="logo-text"><span class="text-white">Jafe</span><span class="text-red">Decor</span></div>
            </a>
        </div>
    </header>

    <section class="section">
        <div class="auth-container" style="max-width: 600px;">
            <h2 class="section-title" style="margin-bottom: 30px; font-size: 32px;">Create an Account</h2>
            <form id="registerForm" action="/api/register" method="POST">
                
                <div class="grid" style="gap: 15px; grid-template-columns: 1fr 1fr;">
                    <div class="form-group" style="margin-bottom: 10px;">
                        <label>First Name <span class="text-red">*</span></label>
                        <input type="text" name="first_name" required placeholder="First Name">
                    </div>
                    <div class="form-group" style="margin-bottom: 10px;">
                        <label>Father's Name <span class="text-red">*</span></label>
                        <input type="text" name="father_name" required placeholder="Father's Name">
                    </div>
                </div>

                <div class="form-group">
                    <label>Grandfather's Name <span class="text-red">*</span></label>
                    <input type="text" name="grandfather_name" required placeholder="Grandfather's Name">
                </div>

                <div class="grid" style="gap: 15px; grid-template-columns: 1fr 1fr;">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" name="email" placeholder="Email Address">
                    </div>
                    <div class="form-group">
                        <label>Nationality <span class="text-red">*</span></label>
                        <select name="nationality" required>
                            <option value="Ethiopia">Ethiopia</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Phone Number (Ethiopia Only) <span class="text-red">*</span></label>
                    <input type="tel" id="reg_phone" name="phone" required placeholder="+2519XXXXXXXX">
                    <small class="phone-error" style="color: red; display: none; margin-top: 5px;">Must be exactly +2519 followed by 8 digits.</small>
                </div>
                
                <div class="form-group" style="position: relative;">
                    <label>Set Password (Numeric Only) <span class="text-red">*</span></label>
                    <input type="password" id="reg_password" name="password" inputmode="numeric" pattern="[0-9]*" required placeholder="Create a numeric password">
                    <i class="fas fa-eye toggle-password" style="position: absolute; right: 15px; top: 45px; cursor: pointer; color: #888;"></i>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%; font-size: 16px;">Register & Proceed</button>
            </form>
            <a href="login.html" class="auth-link">Already have an account? Log in</a>
        </div>
    </section>

</body>
</html>
